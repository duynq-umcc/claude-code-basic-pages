    ::-webkit-scrollbar-thumb { background: #1F2937; border-radius: 3px; }
    .tab-btn { padding: 8px 16px; border-radius: 10px; border: 1px solid #1F2937; background: transparent; color: #9CA3AF; font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
    .tab-btn:hover { border-color: #DF6B33; color: #DF6B33; }
    .tab-btn.active { border-color: #DF6B33; background: #DF6B33; color: #fff; }
    .card { background: #111827; border: 1px solid #1F2937; border-radius: 16px; padding: 24px; }
    canvas { max-height: 320px; }
  </style>
</head>

  const fmtVND = (n) => {
    if (n >= 1e9) return (n / 1e9).toFixed(1) + ' tỷ';
    if (n >= 1e6) return (n / 1e6).toFixed(0) + ' tr';
    return n.toLocaleString('vi-VN');
  };

    'trending-up': '<path d="M23 6l-9.5 9.5-5-5L1 18M17 6h6v6"/>',

  // ─── KPI Cards ─────────────────────────────────────────────────────────────

            </svg>
          </div>
        </div>
        <div style="font-size:22px;font-weight:700;font-family:Poppins,sans-serif;color:#fff">${kpi.value}</div>
        <div style="font-size:12px;color:#9CA3AF;margin-top:2px">${kpi.label}</div>

  // ─── Tab Navigation ─────────────────────────────────────────────────────────
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const tab = btn.dataset.tab;
      document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
      document.getElementById('tab-' + tab).style.display = 'block';
      Object.values(ChartInstances).forEach(c => c?.resize?.());
    });
  });

  // ─── Destroy Chart ───────────────────────────────────────────────────────────

      ChartInstances[id].destroy();
      delete ChartInstances[id];
    }
  }

    color: '#9CA3AF',
    borderColor: '#1F2937',
    font: { family: "'Inter', sans-serif", size: 11 },
  };

  Chart.defaults.borderColor = chartDefaults.borderColor;
  Chart.defaults.font.family = chartDefaults.font.family;
  Chart.defaults.font.size = chartDefaults.font.size;

  // ─── REVENUE Tab ────────────────────────────────────────────────────────────
  function renderRevenueTab() {
    const el = document.getElementById('tab-revenue');
    el.innerHTML = `
      <div style="margin-bottom:24px">
        <div class="card">
          <div style="margin-bottom:20px">
            <h2 style="font-family:Poppins,sans-serif;font-size:18px;font-weight:600;color:#fff">Doanh thu theo tháng</h2>

        </div>
      </div>

          </div>

        </div>
        <div class="card">
          <div style="margin-bottom:20px">
            <h2 style="font-family:Poppins,sans-serif;font-size:18px;font-weight:600;color:#fff">Đơn hàng & Lượt truy cập</h2>
            <p style="font-size:13px;color:#6B7280;margin-top:2px">So sánh đơn hàng và visitors theo tháng</p>

          <canvas id="chart-visitors"></canvas>
        </div>

            <h2 style="font-family:Poppins,sans-serif;font-size:18px;font-weight:600;color:#fff">Doanh thu theo danh mục</h2>
            <p style="font-size:13px;color:#6B7280;margin-top:2px">Phân bổ doanh thu theo nhóm sản phẩm</p>
          </div>
          <canvas id="chart-category-pie"></canvas>
        </div>

          </div>
          <div id="products-table"></div>
        </div>
      </div>
    `;

    // Revenue Area Chart
    destroyChart('chart-revenue-area');
    const ctxArea = document.getElementById('chart-revenue-area').getContext('2d');
    const gradArea = ctxArea.createLinearGradient(0, 0, 0, 300);
    gradArea.addColorStop(0, 'rgba(223,107,51,0.3)');
    gradArea.addColorStop(1, 'rgba(223,107,51,0)');
    ChartInstances['chart-revenue-area'] = new Chart(ctxArea, {
      type: 'line',
      data: {
        labels: MONTHLY_REVENUE.map(d => d.month),
        datasets: [{
          label: 'Doanh thu',
          data: MONTHLY_REVENUE.map(d => d.revenue),
          borderColor: '#DF6B33',
          borderWidth: 2,
          backgroundColor: gradArea,
          fill: true,
          tension: 0.4,
          pointRadius: 4,
          pointBackgroundColor: '#DF6B33',
          yAxisID: 'y',
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#111827',
            borderColor: '#1F2937',
            borderWidth: 1,
            titleColor: '#9CA3AF',
            bodyColor: '#E5E7EB',
            callbacks: {

      options: {
        responsive: true, maintainAspectRatio: true,

        scales: {
          x: { grid: { display: false }, ticks: { color: '#6B7280' } },
          y: { grid: { color: '#1F2937' }, ticks: { color: '#6B7280', callback: v => fmtVND(v) } }
        }
      }
    });

    destroyChart('chart-visitors');
