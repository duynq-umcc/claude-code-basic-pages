<!DOCTYPE html>
<html lang="vi" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Báo Cáo Kinh Doanh — Nexus</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            bg:           '#090A14',
            surface:      '#111827',
            'surface-2':  '#1a2332',
            border:       '#1F2937',
            primary:      '#DF6B33',
            'primary-hover': '#C85B26',
            success:      '#22C55E',
            error:         '#EF4444',
            warning:      '#F59E0B',
            chart1:       '#DF6B33',
            chart2:       '#22C55E',
            chart3:        '#3B82F6',
            chart4:        '#A855F7',
            chart5:        '#EC4899',
          },
          fontFamily: {
            heading: ['Poppins', 'sans-serif'],
            body:    ['Inter', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #090A14; color: #E5E7EB; font-family: 'Inter', sans-serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #090A14; }
    ::-webkit-scrollbar-thumb { background: #1F2937; border-radius: 3px; }
    .recharts-default-tooltip { background: #111827 !important; border: 1px solid #1F2937 !important; border-radius: 8px !important; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
